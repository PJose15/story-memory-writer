<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <filter id="wood">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.15" numOctaves="5" seed="3" result="noise"/>
      <feColorMatrix type="matrix" values="0.15 0 0 0 0.10
                                            0.08 0 0 0 0.06
                                            0.04 0 0 0 0.03
                                            0 0 0 1 0" in="noise" result="colored"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#1a0e08"/>
  <rect width="100%" height="100%" filter="url(#wood)" opacity="0.8"/>
</svg>
