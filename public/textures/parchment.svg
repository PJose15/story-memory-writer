<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="7" result="noise"/>
      <feColorMatrix type="matrix" values="0.05 0 0 0 0.97
                                            0.04 0 0 0 0.93
                                            0.02 0 0 0 0.85
                                            0 0 0 0.5 0" in="noise" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="multiply"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8edd8"/>
  <rect width="100%" height="100%" filter="url(#paper)"/>
</svg>
